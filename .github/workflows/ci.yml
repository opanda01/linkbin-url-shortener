name: CI / CD

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/linkbin-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/linkbin-web

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Test
  # ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: API tests
        working-directory: apps/api
        env:
          REDIS_URL: redis://localhost:6379
          PORT: 3001
          URL_TTL_SECONDS: 60
          RATE_LIMIT_WINDOW_MS: 900000
          RATE_LIMIT_MAX: 60
        run: npm test

      - name: Web tests
        working-directory: apps/web
        run: npm test

      - name: Web build check
        working-directory: apps/web
        env:
          VITE_API_URL: http://localhost:3001
        run: npm run build

  # ──────────────────────────────────────────────────────────
  # JOB 2: Docker build & push — sadece main/master push'ta
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 3: Deploy — sadece main/master push'ta, docker bittikten sonra
  # Gerekli secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    # DEPLOY_HOST secret ayarlanmamışsa bu job atlanır
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/linkbin

            # Güncel imajları çek
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f infra/docker/docker-compose.prod.yml pull

            # Sıfır downtime için sırayla yeniden başlat
            docker compose -f infra/docker/docker-compose.prod.yml up -d --remove-orphans

            # Kullanılmayan imajları temizle
            docker image prune -f

