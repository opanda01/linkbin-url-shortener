services:
  redis:
    image: redis:7-alpine
    container_name: linkbin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    # Dışa açma — sadece internal network üzerinden erişilir
    expose:
      - "6379"

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: linkbin-api
    restart: unless-stopped
    env_file: ./apps/api/.env.prod
    expose:
      - "3001"
    depends_on:
      - redis

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    container_name: linkbin-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: linkbin-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  redis-data:
  caddy-data:
  caddy-config:
