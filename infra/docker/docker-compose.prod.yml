services:
  redis:
    image: redis:7-alpine
    container_name: linkbin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/linkbin-api:latest
    container_name: linkbin-api
    restart: unless-stopped
    env_file: ../../apps/api/.env.prod
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/linkbin-web:latest
    container_name: linkbin-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: linkbin-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../../infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  redis-data:
  caddy-data:
  caddy-config:

